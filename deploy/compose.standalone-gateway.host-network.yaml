services:
  agentshark:
    # Native Linux Docker shares the real host network, so the BFF can reach
    # both loopback-only management listeners without exposing them.
    network_mode: host
    ports: !reset []
    environment:
      AGENTSHARK_LISTEN_ADDR: 127.0.0.1:${AGENTSHARK_PORT}
      AGENTGATEWAY_BASE_URL: http://127.0.0.1:${AGENTGATEWAY_ADMIN_PORT}
      AGENTGUARD_BASE_URL: http://127.0.0.1:${AGENTGUARD_API_PORT}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:${AGENTSHARK_PORT}/healthz",
        ]
