name: agentsharkx

services:
  agentshark:
    image: ${AGENTSHARK_IMAGE}:${AGENTSHARK_VERSION}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        AGENTSHARK_VERSION: ${AGENTSHARK_VERSION}
        AGENTSHARK_REVISION: ${AGENTSHARK_REVISION}
    restart: unless-stopped
    environment:
      AGENTSHARK_LISTEN_ADDR: ${AGENTSHARK_LISTEN_ADDR}
      AGENTSHARK_ENVIRONMENT: ${AGENTSHARK_ENVIRONMENT}
      AGENTSHARK_ADMIN_TOKEN: ${AGENTSHARK_ADMIN_TOKEN}
      AGENTSHARK_AUTH_DISABLED: ${AGENTSHARK_AUTH_DISABLED}
      AGENTSHARK_COOKIE_SECURE: ${AGENTSHARK_COOKIE_SECURE}
      AGENTSHARK_UPSTREAM_TIMEOUT: ${AGENTSHARK_UPSTREAM_TIMEOUT}
      AGENTSHARK_UPSTREAM_RETRY_MAX: ${AGENTSHARK_UPSTREAM_RETRY_MAX}
      AGENTSHARK_SCAN_TIMEOUT: ${AGENTSHARK_SCAN_TIMEOUT}
      AGENTSHARK_POLL_INTERVAL: ${AGENTSHARK_POLL_INTERVAL}
      AGENTSHARK_REDACT_PAYLOADS: ${AGENTSHARK_REDACT_PAYLOADS}
      AGENTGATEWAY_BASE_URL: ${AGENTGATEWAY_BASE_URL}
      AGENTGATEWAY_ADMIN_TOKEN: ${AGENTGATEWAY_ADMIN_TOKEN}
      AGENTGATEWAY_CONSOLE_URL: ${AGENTGATEWAY_CONSOLE_URL}
      AGENTGUARD_BASE_URL: ${AGENTGUARD_BASE_URL}
      AGENTGUARD_ADMIN_TOKEN: ${AGENTGUARD_ADMIN_TOKEN}
      AGENTGUARD_CONSOLE_URL: ${AGENTGUARD_CONSOLE_URL}
      AGENTGUARD_VERSION: ${AGENTGUARD_VERSION}
    ports:
      - "${AGENTSHARK_BIND}:${AGENTSHARK_PORT}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
  agentgateway:
    image: ${AGENTGATEWAY_IMAGE}:${AGENTGATEWAY_VERSION}
    user: "${AGENTGATEWAY_RUNTIME_UID:-65532}:${AGENTGATEWAY_RUNTIME_GID:-65532}"
    command: ["-f", "/etc/agentgateway/config.yaml"]
    restart: unless-stopped
    environment:
      ADMIN_ADDR: 0.0.0.0:15000
      STATS_ADDR: 0.0.0.0:15020
      READINESS_ADDR: 0.0.0.0:15021
    ports:
      - "${AGENTGATEWAY_ADMIN_BIND}:${AGENTGATEWAY_ADMIN_PORT}:15000"
      - "${AGENTGATEWAY_METRICS_BIND}:${AGENTGATEWAY_METRICS_PORT}:15020"
      - "${AGENTGATEWAY_READINESS_BIND}:${AGENTGATEWAY_READINESS_PORT}:15021"
    volumes:
      # The pinned native console saves POST /api/config back to this file.
      # Keep the host path explicit and management ports loopback-only.
      - ./agentgateway/config.yaml:/etc/agentgateway/config.yaml

  agentguard:
    image: ${AGENTGUARD_IMAGE}:${AGENTGUARD_VERSION}
    build:
      context: ${AGENTGUARD_BUILD_CONTEXT}
      dockerfile: Dockerfile
    command: ["serve"]
    restart: unless-stopped
    environment:
      AGENTGUARD_HOST: 0.0.0.0
      AGENTGUARD_PORT: 38080
      AGENTGUARD_API_KEY: ${AGENTGUARD_ADMIN_TOKEN}
      AGENTGUARD_SERVER_PLUGIN_CONFIG: ${AGENTGUARD_SERVER_PLUGIN_CONFIG:-./config/plugins.json}
      AGENTGUARD_POLICY: ${AGENTGUARD_POLICY:-}
      AGENTGUARD_LLM_BASE_URL: ${AGENTGUARD_LLM_BASE_URL:-}
      AGENTGUARD_LLM_MODEL: ${AGENTGUARD_LLM_MODEL:-}
      AGENTGUARD_LLM_API_KEY: ${AGENTGUARD_LLM_API_KEY:-}
    ports:
      - "${AGENTGUARD_API_BIND}:${AGENTGUARD_API_PORT}:38080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H \"X-Api-Key: $$AGENTGUARD_API_KEY\" http://127.0.0.1:38080/v1/backend/health",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

  agentguard-console:
    image: ${AGENTGUARD_IMAGE}:${AGENTGUARD_VERSION}
    command: ["frontend"]
    restart: unless-stopped
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 38008
      AGENTGUARD_API_BASE: http://agentguard:38080
      AGENTGUARD_API_KEY: ${AGENTGUARD_ADMIN_TOKEN}
    ports:
      - "${AGENTGUARD_CONSOLE_BIND}:${AGENTGUARD_CONSOLE_PORT}:38008"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:38008/"]
      interval: 5s
      timeout: 3s
      retries: 12
    depends_on:
      agentguard:
        condition: service_healthy
