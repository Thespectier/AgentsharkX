        requests: { type: [integer, 'null'], minimum: 0 }
        totalTokens: { type: [integer, 'null'], minimum: 0 }
        cost: { type: [number, 'null'], minimum: 0 }
        bucketSeconds: { type: [integer, 'null'], minimum: 0 }
        buckets:
