        severity:
          type: string
          enum: [info, low, medium, high, critical]
        subject:
          type: object
          additionalProperties: false
          properties:
            agentId:
              type: string
            principalId:
              type: string
            sessionId:
              type: string
        target:
          type: object
          additionalProperties: false
          properties:
            provider:
              type: string
            model:
              type: string
            tool:
              type: string
            resource:
              type: string
        phase:
          type: string
        action:
          type: string
        decision:
          type: string
        correlation:
          type: object
          required: [verified]
          properties:
            traceId:
              type: string
            sessionId:
              type: string
            verified:
              type: boolean
        summary:
          type: string
        rawRef:
          type: object
          required: [source, id]
          properties:
            source:
              type: string
            id:
              type: string
    EventsEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/UnifiedEvent'
            nextCursor:
              type: [string, 'null']
        meta:
          $ref: '#/components/schemas/Meta'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId, retryable]
          properties:
            code:
              type: string
            message:
              type: string
            source:
              $ref: '#/components/schemas/Source'
            requestId:
              type: string
            retryable:
              type: boolean
