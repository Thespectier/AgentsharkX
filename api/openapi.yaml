openapi: 3.1.0
info:
  title: AgentsharkX BFF API
  version: 0.4.0-phase4
  description: |
    Source-preserving management API above agentgateway and AgentGuard.
    Phase 4 implements authentication, independent upstream health and
    capability probes, the health-only overview, normalized health SSE, and
    read-only agentgateway resources with setup verification. Trust adds
    source-preserving AgentGuard identities, resources, label updates, and
    bounded asynchronous scan orchestration.
    Later operations remain reserved according to `x-implementation-phase`.
servers:
  - url: /
security:
  - sessionCookie: []
tags:
  - name: Auth
  - name: System
  - name: Connect
  - name: Trust
  - name: Protect
  - name: Audit

paths:
  /api/v1/auth/session:
    post:
      tags: [Auth]
      operationId: createAdminSession
      summary: Exchange the configured admin token for a browser session
      x-implementation-phase: 2
      x-implementation-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '204':
          description: Session cookie created
          headers:
            X-CSRF-Token:
              schema:
                type: string
              description: Token required by subsequent mutating requests
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/system/health:
    get:
      tags: [System]
      operationId: getSystemHealth
      summary: Return independent health state for both upstream sources
      x-implementation-phase: 2
      x-implementation-status: implemented
      responses:
        '200':
          description: Source-scoped health result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/system/capabilities:
    get:
      tags: [System]
      operationId: getCapabilities
      summary: Return the probe-based capability registry
      x-implementation-phase: 2
      x-implementation-status: implemented
      responses:
        '200':
          description: Capability registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilitiesEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/overview:
    get:
      tags: [System]
      operationId: getOverview
      summary: Aggregate source health without fabricating later-phase business data
      x-implementation-phase: 2
      x-implementation-status: implemented
      responses:
        '200':
          description: Partial results are returned with source-scoped metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/stream:
    get:
      tags: [System]
      operationId: streamEvents
      summary: Subscribe to normalized source health changes and heartbeat comments
      x-implementation-phase: 2
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/LastEventId'
      responses:
        '200':
          description: Server-sent event stream with heartbeat comments
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/connect/summary:
    get:
      tags: [Connect]
      operationId: getConnectSummary
      summary: Summarize agentgateway listeners, routes, and backends
      x-implementation-phase: 3
      x-implementation-status: implemented
      responses:
        '200':
          description: Explicit configuration counts and bounded analytics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectSummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/llm/providers:
    get:
      tags: [Connect]
      operationId: listProviders
      summary: List providers explicitly present in agentgateway configuration
      x-implementation-phase: 3
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated provider resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/llm/providers/{resourceId}:
    get:
      tags: [Connect]
      operationId: getProvider
      summary: Get one explicitly configured provider
      x-implementation-phase: 3
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Provider detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/llm/models:
    get:
      tags: [Connect]
      operationId: listModels
      summary: List models explicitly present in agentgateway configuration
      x-implementation-phase: 3
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated direct and virtual model resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/llm/models/{resourceId}:
    get:
      tags: [Connect]
      operationId: getModel
      summary: Get one explicitly configured direct or virtual model
      x-implementation-phase: 3
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Model detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/mcp/servers:
    get:
      tags: [Connect]
      operationId: listGatewayMcpServers
      summary: List agentgateway MCP targets without merging AgentGuard resources
      x-implementation-phase: 3
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated MCP targets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/mcp/servers/{resourceId}:
    get:
      tags: [Connect]
      operationId: getGatewayMcpServer
      summary: Get one explicitly configured MCP target
      x-implementation-phase: 3
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: MCP target detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/traffic/routes:
    get:
      tags: [Connect]
      operationId: listTrafficRoutes
      summary: List explicit agentgateway traffic routes
      x-implementation-phase: 3
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated HTTP and TCP routes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutePageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/traffic/routes/{resourceId}:
    get:
      tags: [Connect]
      operationId: getTrafficRoute
      summary: Get one explicit traffic route
      x-implementation-phase: 3
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Traffic route detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/analytics:
    get:
      tags: [Connect]
      operationId: getConnectAnalytics
      summary: Return request-log analytics or an explicit unavailable state
      x-implementation-phase: 3
      x-implementation-status: implemented
      responses:
        '200':
          description: Bounded agentgateway analytics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/connect/setup:
    get:
      tags: [Connect]
      operationId: verifyGatewaySetup
      summary: Verify the configured management runtime and readable configuration
      x-implementation-phase: 3
      x-implementation-status: implemented
      responses:
        '200':
          description: Live setup verification and native console deep links
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectSetupEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/trust/agents:
    get:
      tags: [Trust]
      operationId: listAgents
      summary: List identities constructed only from explicit AgentGuard fields
      x-implementation-phase: 4
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Explicit AgentGuard identities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustAgentPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/trust/agents/{agentId}:
    get:
      tags: [Trust]
      operationId: getAgent
      summary: Return an AgentGuard-backed agent workspace
      x-implementation-phase: 4
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent identity, explicit sessions, and resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustAgentWorkspaceEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/trust/resources:
    get:
      tags: [Trust]
      operationId: listTrustResources
      summary: List Tool, Skill, and MCP resources while preserving resource type
      x-implementation-phase: 4
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/TrustResourceTypeFilter'
        - $ref: '#/components/parameters/AgentIdFilter'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Explicit AgentGuard tools, skills, and MCP resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustResourcePageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/trust/scans:
    get:
      tags: [Trust]
      operationId: listTrustScans
      summary: List bounded in-memory AgentGuard detection jobs
      x-implementation-phase: 4
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Scan jobs ordered by creation time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScanPageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/trust/scans/{scanId}:
    get:
      tags: [Trust]
      operationId: getTrustScan
      summary: Poll one server-reported AgentGuard detection job
      x-implementation-phase: 4
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ScanId'
      responses:
        '200':
          description: Current job state without synthesized percentage progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScanEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/trust/agents/{agentId}/tools/{tool}/labels:
    patch:
      tags: [Trust]
      operationId: updateToolLabels
      summary: Update AgentGuard labels for one tool
      x-implementation-phase: 4
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/ToolName'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabelUpdate'
      responses:
        '200':
          description: AgentGuard-confirmed tool resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustResourceEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/UpstreamUnavailable'

  /api/v1/trust/agents/{agentId}/skills/detect:
    post:
      tags: [Trust]
      operationId: detectSkills
      summary: Trigger AgentGuard skill detection
      x-implementation-phase: 4
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillDetectionRequest'
      responses:
        '202':
          description: Accepted bounded scan job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScanEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/trust/agents/{agentId}/mcps/detect:
    post:
      tags: [Trust]
      operationId: detectMcps
      summary: Trigger AgentGuard MCP detection
      x-implementation-phase: 4
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPDetectionRequest'
      responses:
        '202':
          description: Accepted bounded scan job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustScanEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/protect/policies:
    get:
      tags: [Protect]
      operationId: listPolicies
      summary: List source-grouped gateway policies and runtime rules
      x-implementation-phase: 5
      responses:
        '200':
          $ref: '#/components/responses/DataResponse'

  /api/v1/protect/runtime-rules/check:
    post:
      tags: [Protect]
      operationId: checkRuntimeRule
      summary: Validate rule syntax with AgentGuard before publication
      x-implementation-phase: 5
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleSource'
      responses:
        '200':
          $ref: '#/components/responses/DataResponse'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /api/v1/protect/agents/{agentId}/runtime-rules:
    post:
      tags: [Protect]
      operationId: publishRuntimeRule
      summary: Publish a checked runtime rule to AgentGuard
      x-implementation-phase: 5
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleSource'
      responses:
        '201':
          $ref: '#/components/responses/DataResponse'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /api/v1/protect/agents/{agentId}/runtime-rules/{ruleId}:
    delete:
      tags: [Protect]
      operationId: deleteRuntimeRule
      summary: Delete an AgentGuard runtime rule after explicit confirmation
      x-implementation-phase: 5
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/RuleId'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Rule deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/protect/approvals:
    get:
      tags: [Protect]
      operationId: listApprovals
      summary: List pending AgentGuard approval tickets
      x-implementation-phase: 5
      responses:
        '200':
          $ref: '#/components/responses/DataResponse'

  /api/v1/protect/approvals/{ticketId}/approve:
    post:
      tags: [Protect]
      operationId: approveTicket
      summary: Approve one pending ticket with an operator note
      x-implementation-phase: 5
      parameters:
        - $ref: '#/components/parameters/TicketId'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalAction'
      responses:
        '200':
          $ref: '#/components/responses/DataResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/protect/approvals/{ticketId}/deny:
    post:
      tags: [Protect]
      operationId: denyTicket
      summary: Deny one pending ticket with an operator note
      x-implementation-phase: 5
      parameters:
        - $ref: '#/components/parameters/TicketId'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalAction'
      responses:
        '200':
          $ref: '#/components/responses/DataResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/audit/analytics:
    get:
      tags: [Audit]
      operationId: getAuditAnalytics
      summary: Return source-preserving traffic and security trends
      x-implementation-phase: 6
      responses:
        '200':
          $ref: '#/components/responses/DataResponse'

  /api/v1/audit/events:
    get:
      tags: [Audit]
      operationId: listAuditEvents
      summary: List normalized events without implied task correlation
      x-implementation-phase: 6
      parameters:
        - $ref: '#/components/parameters/SourceFilter'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Normalized activity page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsEnvelope'

  /api/v1/audit/events/{source}/{eventId}:
    get:
      tags: [Audit]
      operationId: getAuditEvent
      summary: Return redacted normalized and raw detail for one source event
      x-implementation-phase: 6
      parameters:
        - $ref: '#/components/parameters/SourcePath'
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          $ref: '#/components/responses/DataResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/audit/sessions:
    get:
      tags: [Audit]
      operationId: listAuditSessions
      summary: List explicit AgentGuard sessions and their runtime events
      x-implementation-phase: 6
      responses:
        '200':
          $ref: '#/components/responses/DataResponse'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: agentshark_session

  parameters:
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 256
    AgentIdFilter:
      name: agentId
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
    ToolName:
      name: tool
      in: path
      required: true
      description: Opaque AgentsharkX tool resource ID, not an inferred or user-supplied upstream name
      schema:
        type: string
        minLength: 1
        maxLength: 256
    ScanId:
      name: scanId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    TrustResourceTypeFilter:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TrustResourceType'
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
    TicketId:
      name: ticketId
      in: path
      required: true
      schema:
        type: string
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
    SourcePath:
      name: source
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Source'
    SourceFilter:
      name: source
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Source'
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
    Search:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 200
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    ResourceId:
      name: resourceId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    LastEventId:
      name: Last-Event-ID
      in: header
      required: false
      schema:
        type: string
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string

  responses:
    DataResponse:
      description: Source-preserving response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DataEnvelope'
    Unauthorized:
      description: Authentication failed or session missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: CSRF validation failed or the operation is forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServiceUnavailable:
      description: The BFF cannot safely complete the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UpstreamUnavailable:
      description: The required upstream source is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadGateway:
      description: The upstream response no longer matches the pinned contract
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Upstream object was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Object was already modified or approval already resolved
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationFailed:
      description: Upstream validation rejected the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    Source:
      type: string
      enum: [agentgateway, agentguard]
    GatewaySource:
      type: string
      enum: [agentgateway]
    GuardSource:
      type: string
      enum: [agentguard]
    LoginRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 1
          writeOnly: true
    Meta:
      type: object
      required: [fetchedAt, stale]
      properties:
        source:
          $ref: '#/components/schemas/Source'
        sourceVersion:
          type: string
        fetchedAt:
          type: string
          format: date-time
        stale:
          type: boolean
        partial:
          type: boolean
          default: false
        sourceFailures:
          type: array
          items:
            $ref: '#/components/schemas/SourceFailure'
    SourceFailure:
      type: object
      required: [source, code, message]
      properties:
        source:
          $ref: '#/components/schemas/Source'
        code:
          type: string
        message:
          type: string
    DataEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          description: Operation-specific normalized data
        meta:
          $ref: '#/components/schemas/Meta'
    HealthSource:
      type: object
      required: [source, label, status, latencyMs, checkedAt]
      properties:
        source:
          $ref: '#/components/schemas/Source'
        label:
          type: string
        status:
          type: string
          enum: [healthy, degraded, down, unknown]
        version:
          type: string
        latencyMs:
          type: [integer, 'null']
          minimum: 0
        checkedAt:
          type: string
          format: date-time
        message:
          type: string
    HealthEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/HealthSource'
        meta:
          $ref: '#/components/schemas/Meta'
    Capability:
      type: object
      required: [id, source, status, checkedAt]
      properties:
        id:
          type: string
        source:
          $ref: '#/components/schemas/Source'
        status:
          type: string
          enum: [supported, partial, link-out, unavailable]
        checkedAt:
          type: string
          format: date-time
        reason:
          type: string
    CapabilitiesEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Capability'
        meta:
          $ref: '#/components/schemas/Meta'
    SetupStep:
      type: object
      additionalProperties: false
      required: [id, label, complete]
      properties:
        id:
          type: string
        label:
          type: string
        complete:
          type: boolean
        command:
          type: string
    Setup:
      type: object
      additionalProperties: false
      required: [complete, steps]
      properties:
        complete:
          type: boolean
        steps:
          type: array
          items:
            $ref: '#/components/schemas/SetupStep'
    Metric:
      type: object
      additionalProperties: false
      required: [id, label, source, value, format, delta, trend, tone, context]
      properties:
        id:
          type: string
        label:
          type: string
        source:
          $ref: '#/components/schemas/Source'
        value:
          type: number
        format:
          type: string
          enum: [integer, percent, duration, currency]
        delta:
          type: number
        trend:
          type: string
          enum: [up, down, flat]
        tone:
          type: string
          enum: [default, success, warning, danger]
        context:
          type: string
    TrendPoint:
      type: object
      additionalProperties: false
      required: [time, requests, latency, errors, denied]
      properties:
        time:
          type: string
        requests:
          type: number
        latency:
          type: number
        errors:
          type: number
        denied:
          type: number
    OverviewData:
      type: object
      additionalProperties: false
      required: [environment, mode, health, metrics, trend, events, setup]
      properties:
        environment:
          type: string
        mode:
          type: string
          enum: [health-only, operational]
        health:
          type: array
          items:
            $ref: '#/components/schemas/HealthSource'
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/Metric'
        trend:
          type: array
          items:
            $ref: '#/components/schemas/TrendPoint'
        events:
          type: array
          items:
            $ref: '#/components/schemas/UnifiedEvent'
        setup:
          $ref: '#/components/schemas/Setup'
    OverviewEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/OverviewData'
        meta:
          $ref: '#/components/schemas/Meta'
    RawRef:
      type: object
      additionalProperties: false
      required: [source, id]
      properties:
