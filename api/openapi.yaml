        rawRef: { $ref: '#/components/schemas/RawRef' }
        name: { type: string }
        kind: { type: string, enum: [direct, virtual] }
        provider: { type: string }
        targetModel: { type: string }
        routing: { type: string, enum: [weighted, failover, conditional] }
        targets:
          type: array
          items: { type: string }
    GatewayMCPServer:
      type: object
      additionalProperties: false
